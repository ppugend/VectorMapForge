<!DOCTYPE html>
<html>
<head>
    <title>Clean Map Viewer</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        /* Hide all MapLibre default UI */
        .maplibregl-ctrl-top-right, .maplibregl-ctrl-bottom-right, 
        .maplibregl-ctrl-top-left, .maplibregl-ctrl-bottom-left { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script type="module">
        const p = new URLSearchParams(window.location.search);
        const region = p.get('region') || 'south-korea';

        const tileHost = `http://${window.location.hostname}:8081`;
        const styleUrl = `${tileHost}/styles/${region}-pretty/style.json`;

        // Fetch style and fix URLs that tileserver-rs may not have rewritten
        const styleRes = await fetch(styleUrl);
        const style = await styleRes.json();
        for (const src of Object.values(style.sources || {})) {
            if (typeof src.url === 'string' && src.url.startsWith('mbtiles://')) {
                const id = src.url.slice('mbtiles://'.length);
                src.url = `${tileHost}/data/${id}.json`;
            }
        }
        // Use local sprite served by manager (tileserver-rs doesn't serve static files)
        if (style.sprite) {
            style.sprite = `${window.location.origin}/sprites/sprite`;
        }

        // Resolve default center/zoom from TileJSON if not provided in URL params
        let defaultLng = 0, defaultLat = 0, defaultZoom = 2;
        try {
            const srcUrl = Object.values(style.sources || {})[0]?.url;
            if (srcUrl) {
                const tj = await fetch(srcUrl).then(r => r.json());
                if (tj.center) { [defaultLng, defaultLat, defaultZoom] = tj.center; }
            }
        } catch (_) {}

        const lng = parseFloat(p.get('lng') ?? p.get('lon')) || defaultLng;
        const lat = parseFloat(p.get('lat')) || defaultLat;
        const zoom = parseFloat(p.get('zoom')) || defaultZoom;

        window._map = new maplibregl.Map({
            container: 'map',
            style: style,
            center: [lng, lat],
            zoom: zoom,
            attributionControl: false
        });

        // Add a transparent placeholder for any missing sprite icons
        window._map.on('styleimagemissing', (e) => {
            if (window._map.hasImage(e.id)) return;
            const size = 16;
            window._map.addImage(e.id, { width: size, height: size, data: new Uint8ClampedArray(size * size * 4) });
        });
    </script>
</body>
</html>
