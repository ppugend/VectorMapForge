<!DOCTYPE html>
<html>
<head>
    <title>Clean Map Viewer</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        /* Hide all MapLibre default UI */
        .maplibregl-ctrl-top-right, .maplibregl-ctrl-bottom-right, 
        .maplibregl-ctrl-top-left, .maplibregl-ctrl-bottom-left { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script type="module">
        const p = new URLSearchParams(window.location.search);
        // region is optional — defaults to 'global' (merged multi-region style)
        const region = p.get('region') || 'global';

        const styleUrl = `${window.location.origin}/styles/${region}/style.json`;

        // Style endpoint rewrites all URLs (mbtiles://, sprite, glyphs) server-side
        const styleRes = await fetch(styleUrl);
        const style = await styleRes.json();

        // Resolve default center/zoom from TileJSON if not provided in URL params
        let defaultLng = 0, defaultLat = 0, defaultZoom = 2;
        try {
            const srcUrl = Object.values(style.sources || {})[0]?.url;
            if (srcUrl) {
                const tj = await fetch(srcUrl).then(r => r.json());
                if (tj.center) { [defaultLng, defaultLat, defaultZoom] = tj.center; }
            }
        } catch (_) {}

        // ZXY tile coordinate → center lat/lng (tile center point)
        function zxyToLatLng(z, x, y) {
            const n = Math.PI - 2 * Math.PI * (y + 0.5) / Math.pow(2, z);
            return {
                lat: 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n))),
                lng: (x + 0.5) / Math.pow(2, z) * 360 - 180,
            };
        }

        let lng, lat, zoom;
        const pz = parseInt(p.get('z')), px = parseInt(p.get('x')), py = parseInt(p.get('y'));
        if (!isNaN(pz) && !isNaN(px) && !isNaN(py)) {
            const c = zxyToLatLng(pz, px, py);
            lat = c.lat; lng = c.lng; zoom = pz;
        } else {
            lng = parseFloat(p.get('lng') ?? p.get('lon')) || defaultLng;
            lat = parseFloat(p.get('lat')) || defaultLat;
            zoom = parseFloat(p.get('zoom')) || defaultZoom;
        }

        window._map = new maplibregl.Map({
            container: 'map',
            style: style,
            center: [lng, lat],
            zoom: zoom,
            attributionControl: { compact: true, customAttribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors' }
        });

        // Add a transparent placeholder for any missing sprite icons
        window._map.on('styleimagemissing', (e) => {
            if (window._map.hasImage(e.id)) return;
            const size = 16;
            window._map.addImage(e.id, { width: size, height: size, data: new Uint8ClampedArray(size * size * 4) });
        });
    </script>
</body>
</html>
