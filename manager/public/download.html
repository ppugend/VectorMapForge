<!DOCTYPE html>
<html>
<head>
    <title>Build Artifacts</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .file-item { margin: 10px 0; padding: 10px; background: #f0f0f0; border-radius: 4px; display: flex; justify-content: space-between; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📦 Build Artifacts</h1>
    <p>Download these files to move them to your production server.</p>
    <div id="fileList">Loading...</div>
    <hr>
    <a href="/">⬅️ Back to Dashboard</a>

    <script>
        async function loadFiles() {
            const res = await fetch('/api/files');
            const files = await res.json();
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            files.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span>${f.name}</span> <a href="${f.path}" download>Download</a>`;
                list.appendChild(div);
            });
        }
        loadFiles();
    </script>
</body>
</html>
