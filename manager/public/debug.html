<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>body{margin:0}#map{width:100vw;height:100vh}</style>
</head>
<body>
<div id="map"></div>
<pre id="log" style="position:fixed;top:0;left:0;background:rgba(0,0,0,0.8);color:#0f0;font-size:11px;max-width:50%;max-height:50%;overflow:auto;margin:0;padding:5px;z-index:9999"></pre>
<script>
const log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; log.scrollTop = log.scrollHeight; }

// Override fetch to intercept tile requests
const origFetch = fetch;
window.fetch = async function(...args) {
    const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '?';
    try {
        const res = await origFetch(...args);
        if (url.includes('.pbf')) {
            L(`TILE ${res.status} ${url.split('/').slice(-3).join('/')} ct:${res.headers.get('content-type')} ce:${res.headers.get('content-encoding')}`);
        }
        return res;
    } catch(e) {
        L(`FETCH ERROR ${url}: ${e.message}`);
        throw e;
    }
};

const map = new maplibregl.Map({
    container: 'map',
    style: 'http://127.0.0.1:8081/styles/south-korea-pretty/style.json',
    center: [127.0, 37.5],
    zoom: 7,
    attributionControl: false
});

map.on('error', e => L('MAP ERROR: ' + JSON.stringify(e.error)));
map.on('styledata', () => L('style loaded'));
map.on('sourcedata', e => { if(e.isSourceLoaded) L('source loaded: ' + e.sourceId); });
map.on('load', () => L('MAP LOADED OK'));
</script>
</body>
</html>
