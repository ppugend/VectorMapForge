services:
  tileserver:
    image: ghcr.io/vinayakkulkarni/tileserver-rs:latest
    container_name: vmf-tileserver
    expose:
      - "8080"
    volumes:
      - osm_persistent_data:/data:ro
    environment:
      - RUST_LOG=info
    command: ["./tileserver-rs", "/data"]
    restart: unless-stopped

  dashboard:
    image: oven/bun:1.1-alpine
    container_name: vmf-dashboard
    working_dir: /app
    ports:
      - "${PUBLIC_PORT:-8050}:3000"
      - "127.0.0.1:${ADMIN_PORT:-8051}:3001"
    volumes:
      - ./manager:/app
      - osm_persistent_data:/data
      - osm_build_temp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - TEMP_DIR=/tmp
      - PUBLIC_PORT=3000
      - ADMIN_PORT=3001
      - TILESERVER_URL=http://tileserver:8080
      - BUILD_DISABLED=false
    command: sh -c "apk add --no-cache docker-cli curl tar unzip && bun install && bun server.js"
    restart: unless-stopped

volumes:
  osm_persistent_data:
    name: osm_persistent_data
    driver: local
  osm_build_temp:
    name: osm_build_temp
    driver: local
