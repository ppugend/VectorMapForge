services:
  manager:
    build: ./manager
    container_name: osm_manager
    ports:
      - "8080:3000"           # public: tiles, viewer
      - "127.0.0.1:8082:3001" # admin:  dashboard (localhost only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./manager:/app
      - manager_modules:/app/node_modules
      - osm_data:/osm_data
      - osm_temp:/osm_temp
    environment:
      - DATA_DIR=/osm_data
      - TEMP_DIR=/osm_temp
      - PLANETILER_JVM_MEMORY=${PLANETILER_JVM_MEMORY:-6g}
    command: bun server.js
    restart: unless-stopped

volumes:
  osm_data:
    name: osm_persistent_data
  osm_temp:
    name: osm_build_temp
  manager_modules:
    name: osm_manager_modules
