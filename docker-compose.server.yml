services:
  manager:
    image: oven/bun:alpine
    container_name: vectormapforge
    working_dir: /app
    ports:
      - "8050:3000"           # public  : tiles, viewer (expose via reverse proxy)
      - "127.0.0.1:8051:3001" # admin   : import/export, localhost only
    volumes:
      - ./manager:/app
      - osm_data:/osm_data
    environment:
      - DATA_DIR=/osm_data
      - TEMP_DIR=/osm_temp
      - BUILD_DISABLED=true
      - PLANETILER_JVM_MEMORY=${PLANETILER_JVM_MEMORY:-512m}
      # Uncomment if serving behind a reverse proxy:
      # - PUBLIC_URL=https://tiles.example.com
    command: sh -c "apk add --no-cache curl tar unzip && bun install && bun server.js"
    restart: unless-stopped

volumes:
  osm_data:
    name: osm_persistent_data
